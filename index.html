<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DNB">
<meta name="theme-color" content="#0a0c10">
<title>DNB Consultor</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0a0c10;--sf:#111318;--sf2:#181c22;--bd:#1e2228;--bd2:#232830;--g:#00e87a;--y:#f5c542;--r:#ff4a6b;--b:#3d9eff;--mu:#5a6070;--tx:#e8eaf0;--tx2:#9aa0b0}
html,body{height:100%;overflow-x:hidden}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--tx);padding-bottom:40px}
.hdr{background:linear-gradient(135deg,#0d1117,#111820);border-bottom:1px solid var(--bd);padding:max(16px,env(safe-area-inset-top,16px)) 16px 12px;position:sticky;top:0;z-index:50}
.hdr-row{display:flex;align-items:center;justify-content:space-between}
.hbadge{font-family:'DM Mono',monospace;font-size:9px;color:var(--g);letter-spacing:.1em;margin-bottom:4px}
h1{font-size:18px;font-weight:800;letter-spacing:-.02em}
h1 span{color:var(--g)}
.rbtn{background:rgba(255,74,107,.12);border:1px solid rgba(255,74,107,.3);color:var(--r);font-family:'DM Mono',monospace;font-size:10px;padding:7px 12px;border-radius:8px;cursor:pointer}
.chips{display:flex;gap:8px;padding:12px 14px 0;align-items:center}
.chip{flex:1;border-radius:9px;padding:9px 10px;text-align:center;font-family:'DM Mono',monospace;font-size:11px;border:1.5px solid;cursor:pointer}
.chip.e{border-color:var(--bd2);color:var(--mu);background:var(--sf)}
.chip.c1{border-color:var(--g);background:rgba(0,232,122,.08);color:var(--g)}
.chip.c2{border-color:var(--b);background:rgba(61,158,255,.08);color:var(--b)}
.chip .cn{font-size:13px;font-weight:800;display:block}
.chip .cs{font-size:9px;opacity:.7;margin-top:2px;display:block}
.vs{font-family:'DM Mono',monospace;font-size:11px;color:var(--mu);font-weight:600;flex-shrink:0}
.picker{padding:12px 14px 0}
.pl{font-family:'DM Mono',monospace;font-size:9px;color:var(--mu);margin-bottom:8px}
.pl span{color:var(--g);font-weight:600}
.pg{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.pp{padding:8px 4px;border-radius:8px;border:1.5px solid var(--bd2);background:var(--sf2);font-family:'DM Mono',monospace;font-size:11px;color:var(--tx2);cursor:pointer;text-align:center}
.pp:active{transform:scale(.95)}
.pp.s1{border-color:var(--g);background:rgba(0,232,122,.1);color:var(--g);font-weight:600}
.pp.s2{border-color:var(--b);background:rgba(61,158,255,.1);color:var(--b);font-weight:600}
.tabs{display:flex;border-bottom:1px solid var(--bd);background:var(--sf);margin-top:12px}
.tab{flex:1;padding:10px 2px;text-align:center;font-family:'DM Mono',monospace;font-size:9px;color:var(--mu);cursor:pointer;border-bottom:2px solid transparent;letter-spacing:.02em}
.tab.on{color:var(--g);border-bottom-color:var(--g)}
.res{padding:12px 14px 0}
.lbtns{display:flex;gap:8px;margin-bottom:14px}
.lbtn{flex:1;padding:11px 8px;border-radius:10px;border:1.5px solid var(--bd2);background:var(--sf2);cursor:pointer;text-align:center}
.lbtn.on{border-color:var(--g);background:rgba(0,232,122,.08)}
.lbtn .ln{font-size:14px;font-weight:800;display:block;color:var(--tx);margin-bottom:2px}
.lbtn .ls{font-family:'DM Mono',monospace;font-size:9px;color:var(--mu);display:block}
.upc{border-radius:14px;padding:16px;margin-bottom:12px;border-width:2px;border-style:solid}
.upc.gc{background:rgba(0,232,122,.07);border-color:rgba(0,232,122,.4)}
.upc.yc{background:rgba(245,197,66,.07);border-color:rgba(245,197,66,.4)}
.upc.rc{background:rgba(255,74,107,.07);border-color:rgba(255,74,107,.4)}
.upc.xc{background:rgba(255,255,255,.02);border-color:#2a2e38}
.upm{font-size:52px;font-weight:800;font-family:'DM Mono',monospace;line-height:1;text-align:center;margin:8px 0 4px}
.upl{font-family:'DM Mono',monospace;font-size:9px;text-align:center;letter-spacing:.08em;margin-bottom:6px}
.upv{font-family:'DM Mono',monospace;font-size:13px;font-weight:700;text-align:center;margin-bottom:6px}
.ups{font-family:'DM Mono',monospace;font-size:9px;color:var(--mu);text-align:center}
.gc .upm,.gc .upl,.gc .upv{color:var(--g)}
.yc .upm,.yc .upl,.yc .upv{color:var(--y)}
.rc .upm,.rc .upl,.rc .upv{color:var(--r)}
.xc .upm,.xc .upl,.xc .upv{color:var(--mu)}
.bg2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.bc{border-radius:12px;padding:12px 10px;border:2px solid;text-align:center}
.bc.gc{background:rgba(0,232,122,.07);border-color:rgba(0,232,122,.4)}
.bc.yc{background:rgba(245,197,66,.07);border-color:rgba(245,197,66,.4)}
.bc.rc{background:rgba(255,74,107,.07);border-color:rgba(255,74,107,.4)}
.bc.xc{background:rgba(255,255,255,.02);border-color:#2a2e38}
.bl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.07em;margin-bottom:4px}
.bm{font-size:13px;font-weight:800;margin-bottom:3px}
.bp{font-size:24px;font-weight:800;font-family:'DM Mono',monospace;line-height:1;margin-bottom:2px}
.bn{font-family:'DM Mono',monospace;font-size:9px;opacity:.4;margin-bottom:4px}
.bv{font-family:'DM Mono',monospace;font-size:10px;font-weight:700}
.gc .bl,.gc .bp,.gc .bv{color:var(--g)}
.yc .bl,.yc .bp,.yc .bv{color:var(--y)}
.rc .bl,.rc .bp,.rc .bv{color:var(--r)}
.xc .bl,.xc .bp,.xc .bv{color:var(--mu)}
.gr{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.gc2{border-radius:12px;padding:12px;border:2px solid;display:flex;align-items:center;justify-content:space-between}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:13px;margin-bottom:10px}
.ct{font-family:'DM Mono',monospace;font-size:9px;color:var(--mu);letter-spacing:.1em;margin-bottom:11px}
.rr{display:flex;justify-content:space-between;font-family:'DM Mono',monospace;font-size:11px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.rr:last-child{border:none}
.bar{margin-bottom:8px}
.bm2{display:flex;justify-content:space-between;font-family:'DM Mono',monospace;font-size:10px;color:var(--tx2);margin-bottom:3px}
.bt{height:5px;background:var(--bd2);border-radius:3px;overflow:hidden}
.bf{height:100%;border-radius:3px}
.pcg{background:linear-gradient(90deg,#00b85e,#00e87a)}
.pcy{background:linear-gradient(90deg,#b8921e,#f5c542)}
.pcr{background:linear-gradient(90deg,#c0293f,#ff4a6b)}
.pcb{background:linear-gradient(90deg,#1a6abf,#3d9eff)}
.pg2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.pc{background:var(--sf2);border-radius:10px;padding:11px;border:1px solid var(--bd)}
.dr{display:flex;justify-content:space-between;font-family:'DM Mono',monospace;font-size:9px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.dr:last-child{border:none}
.fb{padding:5px 10px;border-radius:7px;border:1px solid var(--bd2);background:var(--sf2);font-family:'DM Mono',monospace;font-size:9px;color:var(--mu);cursor:pointer;white-space:nowrap}
.fb.on{border-color:var(--g);background:rgba(0,232,122,.08);color:var(--g)}
.sb{border-radius:10px;padding:10px 12px;margin-bottom:8px}
.np{background:var(--sf);border:1px solid var(--bd);border-radius:11px;padding:16px;text-align:center;color:var(--mu);font-family:'DM Mono',monospace;font-size:11px}
.ft{padding:14px;text-align:center;font-family:'DM Mono',monospace;font-size:9px;color:#2a3040;margin-top:4px}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
</style>
</head>
<body>
<div class="hdr">
  <div class="hbadge">● ADRIATIC ZUCKERLICK · DNB CONSULTOR</div>
  <div class="hdr-row">
    <h1>DNB <span>HT+2</span></h1>
    <button class="rbtn" onclick="resetAll()">↺ Reset</button>
  </div>
</div>
<div class="chips">
  <div class="chip e" id="ch1" onclick="rc(1)"><span class="cn" id="cn1">Jugador 1</span><span class="cs" id="cs1">pulsa abajo</span></div>
  <div class="vs">VS</div>
  <div class="chip e" id="ch2" onclick="rc(2)"><span class="cn" id="cn2">Jugador 2</span><span class="cs" id="cs2">pulsa abajo</span></div>
</div>
<div class="picker" id="pkr">
  <div class="pl" id="pkl">Selecciona <span>Jugador 1</span></div>
  <div class="pg" id="pgg"></div>
</div>
<div id="tw" style="display:none">
  <div class="tabs">
    <div class="tab on" onclick="go('hoy')">HOY 📅</div>
    <div class="tab" onclick="go('res')">RESUMEN</div>
    <div class="tab" onclick="go('det')">DETALLE</div>
    <div class="tab" onclick="go('prf')">PERFILES</div>
  </div>
</div>
<div id="main"></div>
<div class="ft">51.465 partidos · Sesiones 2–7 · Excluye Friendly y La Liga</div>
<script>
var P,A,S;

const PL=[...new Set(Object.values(P).map(d=>[d[0],d[1]]).flat())].sort();

// HOY
function tMin(t){const[h,m]=t.split(':').map(Number);return h*60+m;}
function isFinished(t){return tMin(t)<nowMin()-15;}
function isLive(t){const d=tMin(t)-nowMin();return d>=-15&&d<0;}
function isNext(t){const d=tMin(t)-nowMin();return d>=0&&d<=20;}
function nowMin(){const n=new Date();return n.getHours()*60+n.getMinutes();}
function tCol(t){const d=tMin(t)-nowMin();return d<-15?'#3a4050':d<0?'#ff4a6b':d<=20?'#00e87a':d<=60?'#f5c542':'#9aa0b0';}

function tabHoy(){
  const now=new Date();
  const nm=now.getHours()*60+now.getMinutes();
  const all=S.filter(s=>s[8]||s[9]); // dnb2ok or o45ok
  const vis=all.filter(s=>!isFinished(s[0]));
  const past=all.filter(s=>isFinished(s[0])).length;
  
  let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--mu)">${vis.length} restantes · ${past} ocultos · ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}</div>
    <div id="rfbtn" onclick="doRefresh()" style="font-family:monospace;font-size:11px;color:var(--mu);cursor:pointer;padding:4px 10px;border:1px solid var(--bd2);border-radius:6px">↺</div>
  </div>`;
  
  h+=`<div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap">
    <div class="fb on" id="fa" onclick="sf('a')">Todos</div>
    <div class="fb" id="fd2" onclick="sf('d2')">DNB+2</div>
    <div class="fb" id="fo" onclick="sf('o')">Over 4.5</div>
  </div>`;
  
  if(!vis.length){h+=`<div class="np">No quedan partidos hoy.</div>`;return h;}
  
  const byT={};
  vis.forEach(s=>{if(!byT[s[0]])byT[s[0]]=[];byT[s[0]].push(s);});
  const times=Object.keys(byT).sort();
  
  h+=`<div id="sl">`;
  times.forEach(t=>{
    const ms=byT[t];
    const live=isLive(t),nxt=isNext(t);
    const bg=live?'rgba(255,74,107,.06)':nxt?'rgba(0,232,122,.06)':'rgba(255,255,255,.02)';
    const bdr=live?'rgba(255,74,107,.3)':nxt?'rgba(0,232,122,.25)':'#1e2228';
    const hasd2=ms.some(m=>m[8])?'1':'0';
    const haso=ms.some(m=>m[9])?'1':'0';
    h+=`<div class="sb" data-d2="${hasd2}" data-o="${haso}" style="background:${bg};border:1px solid ${bdr}">`;
    h+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <span style="font-family:'DM Mono',monospace;font-size:14px;font-weight:700;color:${tCol(t)}">${t}</span>
      ${live?'<span style="font-family:monospace;font-size:9px;background:rgba(255,74,107,.2);color:#ff4a6b;padding:2px 7px;border-radius:4px;font-weight:700">⚡ EN JUEGO</span>':''}
      ${(!live&&nxt)?'<span style="font-family:monospace;font-size:9px;background:rgba(0,232,122,.15);color:#00e87a;padding:2px 7px;border-radius:4px">● PRONTO</span>':''}
    </div>`;
    ms.forEach(m=>{
      const[mt,mp1,mp2,pend,o45,u1,u2,bu,d2ok,ook]=m;
      const c1=u1?col(u1):'#5a6070',c2=u2?col(u2):'#5a6070';
      const tags=[];
      if(d2ok) tags.push(`<span style="background:rgba(0,232,122,.15);color:#00e87a;padding:1px 5px;border-radius:3px;font-size:9px;font-family:monospace">DNB+2 ${bu}%</span>`);
      if(ook) tags.push(`<span style="background:rgba(245,197,66,.12);color:#f5c542;padding:1px 5px;border-radius:3px;font-size:9px;font-family:monospace">O4.5 ${o45}%</span>`);
      h+=`<div onclick="goP('${mp1}','${mp2}')" style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-top:1px solid rgba(255,255,255,.04);cursor:pointer">
        <div>
          <div style="font-size:13px;font-weight:700"><span style="color:${c1}">${mp1}</span> <span style="color:var(--mu);font-weight:400;font-size:11px">vs</span> <span style="color:${c2}">${mp2}</span></div>
          <div style="margin-top:3px;display:flex;gap:4px;flex-wrap:wrap">${tags.join('')}</div>
        </div>
        <div style="text-align:right;margin-left:8px;flex-shrink:0">
          <div style="display:flex;gap:6px">
            <div><div style="font-family:monospace;font-size:11px;font-weight:800;color:${c1}">${u1||'—'}%</div><div style="font-family:monospace;font-size:8px;color:var(--mu)">${mp1}</div></div>
            <div><div style="font-family:monospace;font-size:11px;font-weight:800;color:${c2}">${u2||'—'}%</div><div style="font-family:monospace;font-size:8px;color:var(--mu)">${mp2}</div></div>
          </div>
        </div>
      </div>`;
    });
    h+=`</div>`;
  });
  h+=`</div>`;
  return h;
}

function sf(f){
  ['a','d2','o'].forEach(x=>document.getElementById('f'+x)&&document.getElementById('f'+x).classList.remove('on'));
  document.getElementById('f'+f)&&document.getElementById('f'+f).classList.add('on');
  document.querySelectorAll('.sb').forEach(el=>{
    let show=true;
    if(f==='d2') show=el.dataset.d2==='1';
    else if(f==='o') show=el.dataset.o==='1';
    el.style.display=show?'block':'none';
  });
}

async function doRefresh(){
  const btn=document.getElementById('rfbtn');
  if(btn) btn.textContent='⏳';
  try {
    const proxy='https://api.allorigins.win/get?url='+encodeURIComponent('https://eadriaticleague2.leaguerepublic.com/index.html');
    const r=await fetch(proxy,{signal:AbortSignal.timeout(10000)});
    const data=await r.json();
    const raw=data.contents||'';
    if(!raw) throw new Error('empty');
    const cr=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:3000,
        system:'Extrae los partidos de hoy del HTML de Adriatic League. Devuelve SOLO JSON array: [{"time":"HH:MM","p1":"Jugador1","p2":"Jugador2","done":true/false}]. done=true si tiene marcador numérico, false si tiene VS. Omite Cancelled. Jugadores entre paréntesis: "Barcelona (Odin)" -> "Odin". Solo partidos de hoy. Sin markdown.',
        messages:[{role:'user',content:'HTML:
'+raw.substring(0,80000)}]
      })
    });
    const cd=await cr.json();
    const parsed=JSON.parse(cd.content[0].text.trim());
    const newS=buildS(parsed);
    if(newS.length>0){
      // Update S array in place
      S.length=0;
      newS.forEach(x=>S.push(x));
      if(tab==='hoy') render();
      if(btn){btn.textContent='✓';setTimeout(()=>{if(btn)btn.textContent='↺';},2000);}
    } else throw new Error('no matches');
  } catch(e){
    console.log('refresh error:',e.message);
    if(btn) btn.textContent='↺';
  }
}

function buildS(raw){
  if(!Array.isArray(raw)) return [];
  const res=[],seen=new Set();
  raw.forEach(m=>{
    const k=pk(m.p1,m.p2);
    const dk=m.time+'|'+k;
    if(seen.has(dk)||!m.p1||!m.p2||m.p1===m.p2) return;
    seen.add(dk);
    const d=pd(k);
    if(!d) return;
    const dv=pv(d);
    const isF=m.p1===dv.p1;
    const u1=isF?dv.u1_2:dv.u2_2;
    const u2=isF?dv.u2_2:dv.u1_2;
    const bu=Math.max(u1||0,u2||0);
    res.push([m.time,m.p1,m.p2,m.done?0:1,dv.o45,u1,u2,bu,bu>=88,dv.o45>=78]);
  });
  return res.sort((a,b)=>a[0].localeCompare(b[0]));
}

// RESUMEN
function tabRes(dv){
  const lbtns=`<div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--mu);margin-bottom:7px">¿QUIÉN VA GANANDO AL HT?</div>
    <div class="lbtns">
      <div class="lbtn${lR===dv.p1?' on':''}" onclick="setL('R','${dv.p1}')"><span class="ln">${dv.p1}</span><span class="ls">WR ${dv.wr1}%</span></div>
      <div class="lbtn${lR===dv.p2?' on':''}" onclick="setL('R','${dv.p2}')"><span class="ln">${dv.p2}</span><span class="ls">WR ${dv.wr2}%</span></div>
    </div>`;
  
  if(!lR){
    const u1=dv.u1_2,u2=dv.u2_2;
    const o35=Math.min(99,Math.round(dv.o45*1.139*10)/10);
    return lbtns+`<div class="bg2">
      <div class="bc ${u1?cls(u1):'xc'}" onclick="setL('R','${dv.p1}');render()">
        <div class="bl">SI LIDERA ${dv.p1.toUpperCase()}</div>
        <div class="bp">${u1||'—'}${u1?'%':''}</div>
        <div class="bv">${u1?vrd(u1):'—'}</div>
        <div class="bn">${dv.nd1||0} directos</div>
      </div>
      <div class="bc ${u2?cls(u2):'xc'}" onclick="setL('R','${dv.p2}');render()">
        <div class="bl">SI LIDERA ${dv.p2.toUpperCase()}</div>
        <div class="bp">${u2||'—'}${u2?'%':''}</div>
        <div class="bv">${u2?vrd(u2):'—'}</div>
        <div class="bn">${dv.nd2||0} directos</div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
      <div class="gc2 ${cls(o35)}" style="border-color:${col(o35)}66"><div><div style="font-size:15px;font-weight:800">Over 3.5</div></div><div style="text-align:right"><div style="font-size:22px;font-weight:800;font-family:monospace;color:${col(o35)}">${o35}%</div></div></div>
      <div class="gc2 ${cls(dv.o45)}" style="border-color:${col(dv.o45)}66"><div><div style="font-size:15px;font-weight:800">Over 4.5</div></div><div style="text-align:right"><div style="font-size:22px;font-weight:800;font-family:monospace;color:${col(dv.o45)}">${dv.o45}%</div></div></div>
    </div>
    <div class="card"><div class="ct">DATOS DEL PAR</div>
      <div class="rr"><span style="color:var(--tx2)">Media goles</span><b style="font-family:monospace">${dv.mg}</b></div>
      <div class="rr"><span style="color:var(--tx2)">Over 5.5</span><b style="font-family:monospace">${dv.o55}%</b></div>
      <div class="rr"><span style="color:var(--tx2)">Frec. HT diff≥2</span><b style="font-family:monospace">${dv.freq}%</b></div>
    </div>`;
  }
  
  const u2v=getU(dv,lR,2),u1v=getU(dv,lR,1),u3v=getU(dv,lR,3);
  const o35=Math.min(99,Math.round(dv.o45*1.139*10)/10);
  function bc2(u,lbl){
    if(!u) return `<div class="bc xc"><div class="bl">${lbl}</div><div class="bp">—</div><div class="bv">—</div></div>`;
    return `<div class="bc ${cls(u)}"><div class="bl">${lbl}</div><div class="bp">${u}%</div><div class="bv">${vrd(u)}</div></div>`;
  }
  return lbtns+`<div class="upc ${u2v?cls(u2v):'xc'}">
    <div class="upl">P(DNB) — ${lR.toUpperCase()} LIDERA CON +2</div>
    <div class="upm">${u2v||'—'}${u2v?'%':''}</div>
    <div class="upv">${u2v?vrd(u2v):'Sin datos'}</div>
    <div class="ups">Datos directos + rivales de nivel similar</div>
  </div>
  <div class="bg2">${bc2(u1v,'DNB diff +1')}${bc2(u3v,'DNB diff +3')}</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
    <div class="gc2 ${cls(o35)}" style="border-color:${col(o35)}66"><div><div style="font-size:15px;font-weight:800">Over 3.5</div></div><div style="text-align:right"><div style="font-size:22px;font-weight:800;font-family:monospace;color:${col(o35)}">${o35}%</div></div></div>
    <div class="gc2 ${cls(dv.o45)}" style="border-color:${col(dv.o45)}66"><div><div style="font-size:15px;font-weight:800">Over 4.5</div></div><div style="text-align:right"><div style="font-size:22px;font-weight:800;font-family:monospace;color:${col(dv.o45)}">${dv.o45}%</div></div></div>
  </div>`;
}

// DETALLE
function tabDet(dv){
  const lbtns=`<div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--mu);margin-bottom:7px">¿QUIÉN VA GANANDO AL HT?</div>
    <div class="lbtns">
      <div class="lbtn${lD===dv.p1?' on':''}" onclick="setL('D','${dv.p1}')"><span class="ln">${dv.p1}</span><span class="ls">WR ${dv.wr1}%</span></div>
      <div class="lbtn${lD===dv.p2?' on':''}" onclick="setL('D','${dv.p2}')"><span class="ln">${dv.p2}</span><span class="ls">WR ${dv.wr2}%</span></div>
    </div>`;
  if(!lD) return lbtns+`<div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--mu);padding:8px 0">Pulsa quién va ganando para ver el desglose</div>
    <div class="card"><div class="ct">DATOS DEL PAR</div>
      <div class="rr"><span style="color:var(--tx2)">Partidos</span><b style="font-family:monospace">${dv.total}</b></div>
      <div class="rr"><span style="color:var(--tx2)">Media goles</span><b style="font-family:monospace">${dv.mg}</b></div>
      <div class="rr"><span style="color:var(--tx2)">Over 4.5</span><b style="font-family:monospace">${dv.o45}%</b></div>
      <div class="rr"><span style="color:var(--tx2)">Over 5.5</span><b style="font-family:monospace">${dv.o55}%</b></div>
    </div>`;
  
  const rival=lD===dv.p1?dv.p2:dv.p1;
  const la=av(lD),ra=av(rival);
  const u2v=getU(dv,lD,2);
  function isRow(diff){
    const v=la&&la['is'+diff];
    if(!v) return `<div class="rr"><span style="color:var(--tx2)">Diff ${diff}</span><span style="color:var(--mu)">sin datos</span></div>`;
    const c=v.dnb>=90?'#00e87a':v.dnb>=80?'#f5c542':'#ff4a6b';
    return `<div class="rr"><span style="color:var(--tx2)">Diff ${diff} · ${v.n}p</span><span>DNB <b style="color:${c}">${v.dnb}%</b> · Pierde <b style="color:#ff4a6b">${v.lose}%</b></span></div>`;
  }
  function irRow(diff){
    const v=ra&&ra['ir'+diff];
    if(!v) return `<div class="rr"><span style="color:var(--tx2)">Diff ${diff}</span><span style="color:var(--mu)">sin datos</span></div>`;
    const c=v.remonta<=5?'#00e87a':v.remonta<=10?'#f5c542':'#ff4a6b';
    return `<div class="rr"><span style="color:var(--tx2)">Diff ${diff} · ${v.n}p</span><span>Remonta <b style="color:${c}">${v.remonta}%</b> · Empata <b style="color:#3d9eff">${v.empata}%</b></span></div>`;
  }
  return lbtns+`<div class="upc ${u2v?cls(u2v):'xc'}">
    <div class="upl">P(DNB) — ${lD.toUpperCase()} +2</div>
    <div class="upm">${u2v||'—'}${u2v?'%':''}</div>
    <div class="ups">Directo: ${lD===dv.p1?dv.nd1:dv.nd2}p · + similares</div>
  </div>
  <div class="card"><div class="ct">🛡 SOLIDEZ DE ${lD.toUpperCase()}</div>${isRow(1)}${isRow(2)}${isRow(3)}</div>
  <div class="card"><div class="ct">⚡ REMONTADA DE ${rival.toUpperCase()}</div>${irRow(1)}${irRow(2)}${irRow(3)}</div>`;
}

// PERFILES
function tabPrf(dv){
  const a1=av(dv.p1),a2=av(dv.p2);
  if(!a1||!a2) return '<div class="np">Sin datos</div>';
  const gt=g=>g==='alto'?'<span style="font-size:9px;background:rgba(0,232,122,.15);color:#00e87a;padding:1px 5px;border-radius:3px;font-family:monospace;margin-left:4px">ALTO</span>':g==='medio'?'<span style="font-size:9px;background:rgba(245,197,66,.15);color:#f5c542;padding:1px 5px;border-radius:3px;font-family:monospace;margin-left:4px">MEDIO</span>':'<span style="font-size:9px;background:rgba(255,74,107,.15);color:#ff4a6b;padding:1px 5px;border-radius:3px;font-family:monospace;margin-left:4px">BAJO</span>';
  function drows(a,type){
    let r='';
    for(const d of[1,2,3]){
      const v=a[type+d];
      if(!v){r+=`<div class="dr"><span style="color:var(--mu)">Diff ${d}</span><span style="color:var(--mu)">—</span></div>`;continue;}
      if(type==='is'){const c=v.dnb>=90?'#00e87a':v.dnb>=80?'#f5c542':'#ff4a6b';r+=`<div class="dr"><span style="color:var(--tx2)">+${d}g</span><span>DNB:<b style="color:${c}">${v.dnb}%</b> P:<b style="color:#ff4a6b">${v.lose}%</b></span></div>`;}
      else{const c=v.remonta<=5?'#00e87a':v.remonta<=10?'#f5c542':'#ff4a6b';r+=`<div class="dr"><span style="color:var(--tx2)">-${d}g</span><span>R:<b style="color:${c}">${v.remonta}%</b> E:<b style="color:#3d9eff">${v.empata}%</b></span></div>`;}
    }
    return r;
  }
  return `<div class="pg2">
    <div class="pc"><div style="font-weight:700;font-size:13px;margin-bottom:5px">${dv.p1} ${gt(a1.grp)}</div>
      <div style="font-family:monospace;font-size:10px;margin-bottom:7px">WR: <b>${a1.wr}%</b></div>
      <div style="font-family:monospace;font-size:9px;color:#00e87a;margin-bottom:4px">🛡 SOLIDEZ</div>${drows(a1,'is')}
      <div style="font-family:monospace;font-size:9px;color:#ff4a6b;margin:7px 0 4px">⚡ REMONTADA</div>${drows(a1,'ir')}
    </div>
    <div class="pc"><div style="font-weight:700;font-size:13px;margin-bottom:5px">${dv.p2} ${gt(a2.grp)}</div>
      <div style="font-family:monospace;font-size:10px;margin-bottom:7px">WR: <b>${a2.wr}%</b></div>
      <div style="font-family:monospace;font-size:9px;color:#00e87a;margin-bottom:4px">🛡 SOLIDEZ</div>${drows(a2,'is')}
      <div style="font-family:monospace;font-size:9px;color:#ff4a6b;margin:7px 0 4px">⚡ REMONTADA</div>${drows(a2,'ir')}
    </div>
  </div>`;
}

// CORE
function go(t){
  tab=t;
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('on',['hoy','res','det','prf'][i]===t));
  render();
}
function setL(tid,player){
  if(tid==='R') lR=lR===player?'':player;
  else lD=lD===player?'':player;
  render();
}
function goP(player1,player2){
  p1=player1;p2=player2;lR='';lD='';
  updChips();document.getElementById('pkr').style.display='none';
  go('res');
}
function render(){
  const m=document.getElementById('main');
  if(tab==='hoy'){m.innerHTML=`<div class="res">${tabHoy()}</div>`;return;}
  const k=pk(p1,p2);
  const d=pd(k);
  if(!d){m.innerHTML=`<div class="res"><div class="np">Sin datos para este par</div></div>`;return;}
  const dv=pv(d);
  dv.p1=d[0];dv.p2=d[1];
  let c='';
  if(tab==='res') c=tabRes(dv);
  else if(tab==='det') c=tabDet(dv);
  else c=tabPrf(dv);
  m.innerHTML=`<div class="res">${c}</div>`;
}
function mkPicker(){
  const pkr=document.getElementById('pkr');
  if(p1&&p2){pkr.style.display='none';return;}
  pkr.style.display='block';
  document.getElementById('pkl').innerHTML=!p1?'Selecciona <span>Jugador 1</span>':'Selecciona <span>Jugador 2</span>';
  document.getElementById('pgg').innerHTML=PL.map(p=>{
    let c='pp';
    if(p===p1) c+=' s1';
    else if(p===p2) c+=' s2';
    return `<div class="${c}" onclick="selP('${p}')">${p}</div>`;
  }).join('');
}
function updChips(){
  const c1=document.getElementById('ch1'),c2=document.getElementById('ch2');
  c1.className='chip '+(p1?'c1':'e');
  c2.className='chip '+(p2?'c2':'e');
  document.getElementById('cn1').textContent=p1||'Jugador 1';
  document.getElementById('cs1').textContent=p1?'✓ seleccionado':'pulsa abajo';
  document.getElementById('cn2').textContent=p2||'Jugador 2';
  document.getElementById('cs2').textContent=p2?'✓ seleccionado':'pulsa abajo';
}
function selP(p){
  if(rch===1){p1=p;rch=0;}
  else if(rch===2){p2=p;rch=0;}
  else if(!p1){p1=p;}
  else if(!p2&&p!==p1){p2=p;}
  else if(p===p1){p1='';lR='';lD='';}
  else if(p===p2){p2='';lR='';lD='';}
  updChips();mkPicker();
  document.getElementById('tw').style.display='block';
  render();
}
function rc(n){
  if((n===1&&p1)||(n===2&&p2)){
    rch=n;
    if(n===1){p1='';lR='';lD='';}else{p2='';lR='';lD='';}
    updChips();mkPicker();render();
  }
}
function resetAll(){
  p1='';p2='';lR='';lD='';rch=0;tab='hoy';
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('on',i===0));
  updChips();mkPicker();render();
}
// Init on load
window.onload=function(){
  fetch('./data.json')
    .then(function(r){return r.json();})
    .then(function(d){
      P=d.P; A=d.A; S=d.S;
      document.getElementById('tw').style.display='block';
      mkPicker();updChips();render();
    })
    .catch(function(e){
      document.body.innerHTML+='<div style="position:fixed;top:80px;left:10px;right:10px;background:red;color:white;padding:12px;border-radius:8px;z-index:9999">Fetch error: '+e.message+'</div>';
    });
};
</script>
</body>
</html>
