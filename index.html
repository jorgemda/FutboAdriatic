<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DNB Consultor">
<meta name="theme-color" content="#0a0c10">
<title>DNB Consultor</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0c10;--surface:#111318;--surface2:#181c22;--border:#1e2228;--border2:#232830;
  --green:#00e87a;--green2:#00b85e;--yellow:#f5c542;--red:#ff4a6b;--blue:#3d9eff;
  --muted:#5a6070;--text:#e8eaf0;--text2:#9aa0b0;
}
html,body{height:100%;overflow-x:hidden}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:40px}
.header{background:linear-gradient(135deg,#0d1117,#111820);border-bottom:1px solid var(--border);padding:max(16px,env(safe-area-inset-top,16px)) 16px 12px;position:sticky;top:0;z-index:50}
.header-row{display:flex;align-items:center;justify-content:space-between}
.hbadge{font-family:'DM Mono',monospace;font-size:9px;color:var(--green);letter-spacing:.1em;margin-bottom:4px;display:flex;align-items:center;gap:5px}
.hbadge::before{content:'●';font-size:7px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.header h1{font-size:18px;font-weight:800;letter-spacing:-.02em}
.header h1 span{color:var(--green)}
.reset-btn{background:rgba(255,74,107,.12);border:1px solid rgba(255,74,107,.3);color:#ff4a6b;font-family:'DM Mono',monospace;font-size:10px;padding:7px 12px;border-radius:8px;cursor:pointer}
.reset-btn:active{background:rgba(255,74,107,.25)}
.selected-bar{display:flex;gap:8px;padding:12px 14px 0;align-items:center}
.sel-chip{flex:1;border-radius:9px;padding:9px 10px;text-align:center;font-family:'DM Mono',monospace;font-size:11px;border:1.5px solid;cursor:pointer}
.sel-chip.empty{border-color:var(--border2);color:var(--muted);background:var(--surface)}
.sel-chip.filled1{border-color:var(--green);background:rgba(0,232,122,.08);color:var(--green)}
.sel-chip.filled2{border-color:var(--blue);background:rgba(61,158,255,.08);color:var(--blue)}
.sel-chip .chip-name{font-size:13px;font-weight:800;font-family:'Syne',sans-serif;display:block}
.sel-chip .chip-sub{font-size:9px;opacity:.7;margin-top:2px;display:block}
.vs-badge{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);font-weight:600;flex-shrink:0}
.picker{padding:12px 14px 0}
.picker-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:.08em;margin-bottom:8px}
.picker-label span{color:var(--green);font-weight:600}
.player-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.player-pill{padding:8px 4px;border-radius:8px;border:1.5px solid var(--border2);background:var(--surface2);font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);cursor:pointer;text-align:center;transition:all .15s}
.player-pill:active{transform:scale(.95)}
.player-pill.p1{border-color:var(--green);background:rgba(0,232,122,.1);color:var(--green);font-weight:600}
.player-pill.p2{border-color:var(--blue);background:rgba(61,158,255,.1);color:var(--blue);font-weight:600}
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface);margin-top:12px}
.tab{flex:1;padding:10px 2px;text-align:center;font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;letter-spacing:.02em}
.tab.active{color:var(--green);border-bottom-color:var(--green)}
.result{padding:12px 14px 0;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

/* LEADER BUTTONS */
.leader-toggle{display:flex;gap:8px;margin-bottom:14px}
.leader-btn{flex:1;padding:11px 8px;border-radius:10px;border:1.5px solid var(--border2);background:var(--surface2);cursor:pointer;text-align:center;transition:all .15s}
.leader-btn.active{border-color:var(--green);background:rgba(0,232,122,.08)}
.leader-btn .lb-name{font-size:14px;font-weight:800;font-family:'Syne',sans-serif;display:block;color:var(--text);margin-bottom:2px}
.leader-btn .lb-sub{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);display:block}

/* UNIFIED P CARD — the main card */
.up-card{border-radius:14px;padding:16px;margin-bottom:12px;border-width:2px;border-style:solid}
.up-card.gc{background:rgba(0,232,122,.07);border-color:rgba(0,232,122,.4)}
.up-card.yc{background:rgba(245,197,66,.07);border-color:rgba(245,197,66,.4)}
.up-card.rc{background:rgba(255,74,107,.07);border-color:rgba(255,74,107,.4)}
.up-card.xc{background:rgba(255,255,255,.02);border-color:#2a2e38}
.up-main{font-size:52px;font-weight:800;font-family:'DM Mono',monospace;line-height:1;text-align:center;margin:8px 0 4px}
.up-label{font-family:'DM Mono',monospace;font-size:9px;text-align:center;letter-spacing:.08em;margin-bottom:8px}
.up-verdict{font-family:'DM Mono',monospace;font-size:13px;font-weight:700;text-align:center;margin-bottom:10px}
.gc .up-main,.gc .up-label,.gc .up-verdict{color:var(--green)}
.yc .up-main,.yc .up-label,.yc .up-verdict{color:var(--yellow)}
.rc .up-main,.rc .up-label,.rc .up-verdict{color:var(--red)}
.xc .up-main,.xc .up-label,.xc .up-verdict{color:var(--muted)}
.up-detail{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.06)}
.up-det-box{text-align:center}
.up-det-val{font-family:'DM Mono',monospace;font-size:13px;font-weight:700}
.up-det-lbl{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-top:2px}
.up-source{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);text-align:center;margin-top:8px}

/* BET GRID */
.bet-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.bet-card{border-radius:12px;padding:12px 10px;border:2px solid;text-align:center}
.bet-card.gc{background:rgba(0,232,122,.07);border-color:rgba(0,232,122,.4)}
.bet-card.yc{background:rgba(245,197,66,.07);border-color:rgba(245,197,66,.4)}
.bet-card.rc{background:rgba(255,74,107,.07);border-color:rgba(255,74,107,.4)}
.bet-card.xc{background:rgba(255,255,255,.02);border-color:#2a2e38}
.bet-lbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.07em;margin-bottom:4px}
.bet-market{font-size:13px;font-weight:800;margin-bottom:3px}
.bet-pct{font-size:24px;font-weight:800;font-family:'DM Mono',monospace;line-height:1;margin-bottom:2px}
.bet-n{font-family:'DM Mono',monospace;font-size:9px;opacity:.4;margin-bottom:4px}
.bet-verdict{font-family:'DM Mono',monospace;font-size:10px;font-weight:700}
.gc .bet-lbl,.gc .bet-pct,.gc .bet-verdict{color:var(--green)}
.yc .bet-lbl,.yc .bet-pct,.yc .bet-verdict{color:var(--yellow)}
.rc .bet-lbl,.rc .bet-pct,.rc .bet-verdict{color:var(--red)}
.xc .bet-lbl,.xc .bet-pct,.xc .bet-verdict{color:var(--muted)}

/* GOLES */
.goles-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.goles-card{border-radius:12px;padding:12px;border:2px solid;display:flex;align-items:center;justify-content:space-between}
.goles-card.gc{background:rgba(0,232,122,.07);border-color:rgba(0,232,122,.4)}
.goles-card.yc{background:rgba(245,197,66,.07);border-color:rgba(245,197,66,.4)}
.goles-card.rc{background:rgba(255,74,107,.07);border-color:rgba(255,74,107,.4)}
.goles-lbl{font-size:15px;font-weight:800}
.goles-sub{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-top:2px}
.goles-pct{font-size:22px;font-weight:800;font-family:'DM Mono',monospace}
.goles-verdict{font-family:'DM Mono',monospace;font-size:9px;margin-top:2px}
.gc .goles-pct,.gc .goles-verdict{color:var(--green)}
.yc .goles-pct,.yc .goles-verdict{color:var(--yellow)}
.rc .goles-pct,.rc .goles-verdict{color:var(--red)}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px;margin-bottom:10px}
.card-title{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:.1em;margin-bottom:11px}
.rs-row{display:flex;justify-content:space-between;font-family:'DM Mono',monospace;font-size:11px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.rs-row:last-child{border:none}

/* BARS */
.bar-row{margin-bottom:8px}
.bar-meta{display:flex;justify-content:space-between;font-family:'DM Mono',monospace;font-size:10px;color:var(--text2);margin-bottom:3px}
.bar-track{height:5px;background:var(--border2);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .5s ease}
.bg{background:linear-gradient(90deg,#00b85e,#00e87a)}
.by{background:linear-gradient(90deg,#b8921e,#f5c542)}
.br{background:linear-gradient(90deg,#c0293f,#ff4a6b)}
.bb{background:linear-gradient(90deg,#1a6abf,#3d9eff)}

/* PROFILE */
.profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.profile-card{background:var(--surface2);border-radius:10px;padding:11px;border:1px solid var(--border)}
.diff-row{display:flex;justify-content:space-between;font-family:'DM Mono',monospace;font-size:9px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.03);flex-wrap:wrap;gap:2px}
.diff-row:last-child{border:none}

/* SCHEDULE */
.filt-btn{padding:5px 10px;border-radius:7px;border:1px solid var(--border2);background:var(--surface2);font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);cursor:pointer;white-space:nowrap}
.filt-btn.active{border-color:var(--green);background:rgba(0,232,122,.08);color:var(--green)}
.sched-block{border-radius:10px;padding:10px 12px;margin-bottom:8px}

.tag{display:inline-block;padding:2px 6px;border-radius:4px;font-family:'DM Mono',monospace;font-size:9px;font-weight:600;margin-left:4px}
.tag-h{background:rgba(0,232,122,.15);color:var(--green)}
.tag-m{background:rgba(245,197,66,.15);color:var(--yellow)}
.tag-l{background:rgba(255,74,107,.15);color:var(--red)}
.no-pair{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:16px;text-align:center;color:var(--muted);font-family:'DM Mono',monospace;font-size:11px}
.footer{padding:14px;text-align:center;font-family:'DM Mono',monospace;font-size:9px;color:#2a3040;margin-top:4px}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>
<div class="header">
  <div class="hbadge">ADRIATIC ZUCKERLICK · DNB CONSULTOR</div>
  <div class="header-row">
    <h1>DNB <span>HT+2</span></h1>
    <button class="reset-btn" onclick="resetAll()">↺ Reset</button>
  </div>
</div>
<div class="selected-bar">
  <div class="sel-chip empty" id="chip1" onclick="rechipClick(1)"><span class="chip-name" id="chip1name">Jugador 1</span><span class="chip-sub" id="chip1sub">pulsa abajo</span></div>
  <div class="vs-badge">VS</div>
  <div class="sel-chip empty" id="chip2" onclick="rechipClick(2)"><span class="chip-name" id="chip2name">Jugador 2</span><span class="chip-sub" id="chip2sub">pulsa abajo</span></div>
</div>
<div class="picker" id="picker">
  <div class="picker-label" id="picker-label">Selecciona <span>Jugador 1</span></div>
  <div class="player-grid" id="player-grid"></div>
</div>
<div id="tabs-wrap" style="display:none">
  <div class="tabs">
    <div class="tab active" onclick="showTab('hoy')">HOY 📅</div>
    <div class="tab" onclick="showTab('resumen')">RESUMEN</div>
    <div class="tab" onclick="showTab('detalle')">DETALLE</div>
    <div class="tab" onclick="showTab('perfiles')">PERFILES</div>
  </div>
</div>
<div id="main"></div>
<div class="footer">51.465 partidos · Sesiones 2–7 · Excluye Friendly y La Liga</div>

<script>
const PAIRS={};
const ADV={};
const SCHEDULE=[]
const PLAYERS=[...new Set(Object.values(PAIRS).flatMap(d=>[d.p1,d.p2]))].sort();

let p1='',p2='',tab='hoy',leaderR='',leaderD='',rechip=0;

function pairKey(a,b){return [a,b].sort().join('|')}

// Get unified P for a specific leader vs rival, at diff level
function getU(d, leader, diff){
  const isP1 = leader===d.p1;
  return isP1 ? d[`u1_${diff}`] : d[`u2_${diff}`];
}

function pCls(v){return v>=90?'gc':v>=80?'yc':'rc'}
function pVerdict(v){return v>=90?'✅ APOSTAR':v>=80?'⚠️ PRECAUCIÓN':'🚫 EVITAR'}
function pColor(v){return v>=90?'#00e87a':v>=80?'#f5c542':'#ff4a6b'}

function bar(label,val,cls){
  const v=Math.min(Math.max(val||0,0),100);
  const c=cls==='bg'?'#00e87a':cls==='by'?'#f5c542':cls==='br'?'#ff4a6b':'#3d9eff';
  return `<div class="bar-row"><div class="bar-meta"><span>${label}</span><b style="color:${c}">${v.toFixed(1)}%</b></div><div class="bar-track"><div class="bar-fill ${cls}" style="width:${v}%"></div></div></div>`;
}

/* ===== HOY ===== */
function tabHoy(){
  const now=new Date();
  const nowMins=now.getHours()*60+now.getMinutes();
  function tMins(t){const[h,m]=t.split(':').map(Number);return h*60+m;}
  function isFinished(t){return tMins(t)<nowMins-15;}
  function isLive(t){const d=tMins(t)-nowMins;return d>=-15&&d<0;}
  function isNext(t){const d=tMins(t)-nowMins;return d>=0&&d<=20;}
  function tColor(t){
    const d=tMins(t)-nowMins;
    if(d<-15) return '#3a4050';
    if(d<0) return '#ff4a6b';
    if(d<=20) return '#00e87a';
    if(d<=60) return '#f5c542';
    return '#9aa0b0';
  }

  const all = SCHEDULE.filter(s=>s.interesting);
  const visible = all.filter(s=>!isFinished(s.time));
  const pastCount = all.filter(s=>isFinished(s.time)).length;

  let html=`<div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-bottom:12px">${visible.length} partidos restantes · ${pastCount} terminados ocultos · ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}</div>`;

  html+=`<div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap">
    <div class="filt-btn active" id="fb-all" onclick="setFilt('all')">Todos</div>
    <div class="filt-btn" id="fb-dnb2" onclick="setFilt('dnb2')">DNB+2 ≥88%</div>
    <div class="filt-btn" id="fb-o45" onclick="setFilt('o45')">Over 4.5</div>
  </div>`;

  if(visible.length===0){
    html+=`<div class="no-pair">No quedan partidos hoy.<br>Vuelve mañana.</div>`;
    return html;
  }

  const byTime={};
  visible.forEach(s=>{if(!byTime[s.time])byTime[s.time]=[];byTime[s.time].push(s);});
  const times=Object.keys(byTime).sort();

  html+=`<div id="sched-list">`;
  times.forEach(time=>{
    const matches=byTime[time];
    const live=isLive(time),next=isNext(time);
    const bg=live?'rgba(255,74,107,.06)':next?'rgba(0,232,122,.06)':'rgba(255,255,255,.02)';
    const bdr=live?'rgba(255,74,107,.3)':next?'rgba(0,232,122,.25)':'#1e2228';

    html+=`<div class="sched-block" data-dnb2="${matches.some(m=>m.dnb2_ok)?1:0}" data-o45="${matches.some(m=>m.o45_ok)?1:0}" style="background:${bg};border:1px solid ${bdr}">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <span style="font-family:'DM Mono',monospace;font-size:14px;font-weight:700;color:${tColor(time)}">${time}</span>
        ${live?'<span style="font-family:monospace;font-size:9px;background:rgba(255,74,107,.2);color:#ff4a6b;padding:2px 7px;border-radius:4px;font-weight:700">⚡ EN JUEGO</span>':''}
        ${(!live&&next)?'<span style="font-family:monospace;font-size:9px;background:rgba(0,232,122,.15);color:#00e87a;padding:2px 7px;border-radius:4px">● PRONTO</span>':''}
      </div>`;

    matches.forEach(m=>{
      // Show both direction scores
                  const c1=m.u_p1_2?pColor(m.u_p1_2):'#5a6070';
      const c2=m.u_p2_2?pColor(m.u_p2_2):'#5a6070';
      const pkm=(a,b)=>[a,b].sort().join('|');
      const pd=PAIRS[pkm(m.p1,m.p2)];

      function badge(val, label) {
        if(val===null||val===undefined) return `<span style="background:rgba(255,255,255,.04);color:#3a4050;padding:2px 6px;border-radius:4px;font-size:9px;font-family:monospace;margin:1px">${label} —</span>`;
        const bg=val>=90?'rgba(0,232,122,.15)':val>=88?'rgba(245,197,66,.12)':'rgba(255,74,107,.1)';
        const col=val>=90?'#00e87a':val>=88?'#f5c542':'#ff4a6b';
        return `<span style="background:${bg};color:${col};padding:2px 6px;border-radius:4px;font-size:9px;font-family:monospace;margin:1px">${label} ${val}%</span>`;
      }
      function badgeO(val, label) {
        if(val===null||val===undefined||val===0) return `<span style="background:rgba(255,255,255,.04);color:#3a4050;padding:2px 6px;border-radius:4px;font-size:9px;font-family:monospace;margin:1px">${label} —</span>`;
        const bg=val>=90?'rgba(0,232,122,.15)':val>=80?'rgba(245,197,66,.12)':'rgba(255,74,107,.1)';
        const col=val>=90?'#00e87a':val>=80?'#f5c542':'#ff4a6b';
        return `<span style="background:${bg};color:${col};padding:2px 6px;border-radius:4px;font-size:9px;font-family:monospace;margin:1px">${label} ${val}%</span>`;
      }

      const p1d2=badge(m.u_p1_2,'DNB+2');
      const p1d3=pd?badge(pd.u1_3,'DNB+3'):badge(null,'DNB+3');
      const p1w3=pd?badge(pd.w1_3,'WIN+3'):badge(null,'WIN+3');
      const p2d2=badge(m.u_p2_2,'DNB+2');
      const p2d3=pd?badge(pd.u2_3,'DNB+3'):badge(null,'DNB+3');
      const p2w3=pd?badge(pd.w2_3,'WIN+3'):badge(null,'WIN+3');
      const bo45=badgeO(m.o45,'O4.5');
      const bo55=badgeO(m.o55,'O5.5');
      const pkm2=(a,b)=>[a,b].sort().join('|');
      const pd2=PAIRS[pkm2(m.p1,m.p2)];
      const bo65=badgeO(pd2?pd2.o65:null,'O6.5');
      const sinDatos=!pd?'<div style="grid-column:1/-1;padding:4px 0"><span style="background:rgba(255,255,255,.04);color:#3a4050;padding:2px 8px;border-radius:4px;font-size:9px;font-family:monospace">⚠️ sin datos suficientes — no apostar</span></div>':'';

      html+=`<div onclick="goToPair('${m.p1}','${m.p2}')" style="padding:8px 0;border-top:1px solid rgba(255,255,255,.04);cursor:pointer">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px">
          <div>
            <div style="font-size:12px;font-weight:700;color:${c1};margin-bottom:4px">${m.p1}</div>
            <div style="display:flex;flex-wrap:wrap;gap:2px">${p1d2}${p1d3}${p1w3}</div>
          </div>
          <div>
            <div style="font-size:12px;font-weight:700;color:${c2};margin-bottom:4px">${m.p2}</div>
            <div style="display:flex;flex-wrap:wrap;gap:2px">${p2d2}${p2d3}${p2w3}</div>
          </div>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:2px;margin-top:2px">${bo45}${bo55}${bo65}</div>
      ${sinDatos}
      </div>`;
    });
    html+=`</div>`;
  });
  html+=`</div>`;
  return html;
}

function setFilt(f){
  document.querySelectorAll('.filt-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('fb-'+f).classList.add('active');
  document.querySelectorAll('.sched-block').forEach(el=>{
    let show=true;
    if(f==='dnb2') show=el.dataset.dnb2==='1';
    else if(f==='o45') show=el.dataset.o45==='1';
    el.style.display=show?'block':'none';
  });
}

function goToPair(player1,player2){
  p1=player1;p2=player2;leaderR='';leaderD='';
  updateChips();
  document.getElementById('picker').style.display='none';
  showTab('resumen');
}

/* ===== RESUMEN ===== */
function tabResumen(d){
  const leaderBtns=`
    <div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-bottom:7px;letter-spacing:.06em">¿QUIÉN VA GANANDO AL HT?</div>
    <div class="leader-toggle">
      <div class="leader-btn${leaderR===d.p1?' active':''}" onclick="setLeader('R','${d.p1}')">
        <span class="lb-name">${d.p1}</span><span class="lb-sub">WR ${d.wr_p1}%</span>
      </div>
      <div class="leader-btn${leaderR===d.p2?' active':''}" onclick="setLeader('R','${d.p2}')">
        <span class="lb-name">${d.p2}</span><span class="lb-sub">WR ${d.wr_p2}%</span>
      </div>
    </div>`;

  if(!leaderR){
    // Show both directions as preview
    const u1=d.u1_2, u2=d.u2_2;
    const preview=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
      <div class="bet-card ${u1?pCls(u1):'xc'}" onclick="setLeader('R','${d.p1}');renderMain()">
        <div class="bet-lbl">SI LIDERA ${d.p1.toUpperCase()}</div>
        <div class="bet-pct">${u1||'—'}${u1?'%':''}</div>
        <div class="bet-verdict">${u1?pVerdict(u1):'—'}</div>
        <div class="bet-n">${d.nd2_p1||0} directos</div>
      </div>
      <div class="bet-card ${u2?pCls(u2):'xc'}" onclick="setLeader('R','${d.p2}');renderMain()">
        <div class="bet-lbl">SI LIDERA ${d.p2.toUpperCase()}</div>
        <div class="bet-pct">${u2||'—'}${u2?'%':''}</div>
        <div class="bet-verdict">${u2?pVerdict(u2):'—'}</div>
        <div class="bet-n">${d.nd2_p2||0} directos</div>
      </div>
    </div>`;

    const o35est=Math.min(99,Math.round(d.o45*1.139*10)/10);
    return `${leaderBtns}${preview}
      <div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:.08em;margin-bottom:8px">MERCADOS DE GOLES</div>
      <div class="goles-row">
        <div class="goles-card ${pCls(o35est)}" style="border-color:${pColor(o35est)}66">
          <div><div class="goles-lbl">Over 3.5</div><div class="goles-sub">~estimado</div></div>
          <div style="text-align:right"><div class="goles-pct" style="color:${pColor(o35est)}">${o35est}%</div><div class="goles-verdict" style="color:${pColor(o35est)}">${pVerdict(o35est,90,82)}</div></div>
        </div>
        <div class="goles-card ${pCls(d.o45)}" style="border-color:${pColor(d.o45)}66">
          <div><div class="goles-lbl">Over 4.5</div><div class="goles-sub">${d.total}p</div></div>
          <div style="text-align:right"><div class="goles-pct" style="color:${pColor(d.o45)}">${d.o45}%</div><div class="goles-verdict" style="color:${pColor(d.o45)}">${pVerdict(d.o45)}</div></div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">DATOS DEL PAR</div>
        <div class="rs-row"><span style="color:#9aa0b0">Media goles</span><b style="font-family:monospace">${d.mg}</b></div>
        <div class="rs-row"><span style="color:#9aa0b0">Over 5.5</span><b style="font-family:monospace">${d.o55}%</b></div>
        <div class="rs-row"><span style="color:#9aa0b0">Frec. HT diff ≥2</span><b style="font-family:monospace">${d.freq_ht2}%</b></div>
      </div>`;
  }

  const rival=leaderR===d.p1?d.p2:d.p1;
  const u2=getU(d,leaderR,2);
  const u1=getU(d,leaderR,1);
  const u3=getU(d,leaderR,3);

  // Main unified card
  function mainCard(u,diff,label){
    if(!u) return `<div class="bet-card xc"><div class="bet-lbl">${label}</div><div class="bet-pct">—</div><div class="bet-n">sin datos</div><div class="bet-verdict">—</div></div>`;
    const cls=pCls(u);
    return `<div class="bet-card ${cls}">
      <div class="bet-lbl">${label}</div>
      <div class="bet-pct">${u}%</div>
      <div class="bet-n">${diff===2?(d.nd2_p1&&leaderR===d.p1?d.nd2_p1:d.nd2_p2)||0:''} directos</div>
      <div class="bet-verdict">${pVerdict(u)}</div>
    </div>`;
  }

  const o35est=Math.min(99,Math.round(d.o45*1.139*10)/10);
  return `${leaderBtns}
    <div class="up-card ${u2?pCls(u2):'xc'}">
      <div class="up-label">P(DNB) — ${leaderR.toUpperCase()} LIDERA CON DIFF +2</div>
      <div class="up-main">${u2||'—'}${u2?'%':''}</div>
      <div class="up-verdict">${u2?pVerdict(u2):'Sin datos'}</div>
      <div class="up-source">Combina datos directos + rivales de nivel similar</div>
    </div>
    <div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:.08em;margin-bottom:8px">OTROS NIVELES DE VENTAJA</div>
    <div class="bet-grid">
      ${mainCard(u1,1,'DNB diff +1 gol')}
      ${mainCard(u3,3,'DNB diff +3')}
      ${(()=>{
        const w=leaderR===d.p1?d.w1_3:d.w2_3;
        if(!w) return '<div class="bet-card xc"><div class="bet-lbl">WIN +3</div><div class="bet-pct">—</div><div class="bet-n">sin datos</div><div class="bet-verdict">—</div></div>';
        const cls=pCls(w);
        return '<div class="bet-card '+cls+'"><div class="bet-lbl">WIN diff +3</div><div class="bet-pct">'+w+'%</div><div class="bet-n">'+(leaderR===d.p1?d.nd2_p1:d.nd2_p2)+'p directos</div><div class="bet-verdict">'+pVerdict(w)+'</div></div>';
      })()}
    </div>
    <div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:.08em;margin-bottom:8px">MERCADOS DE GOLES</div>
    <div class="goles-row">
      <div class="goles-card ${pCls(o35est)}" style="border-color:${pColor(o35est)}66">
        <div><div class="goles-lbl">Over 3.5</div></div>
        <div><div class="goles-pct" style="color:${pColor(o35est)}">${o35est}%</div></div>
      </div>
      <div class="goles-card ${pCls(d.o45)}" style="border-color:${pColor(d.o45)}66">
        <div><div class="goles-lbl">Over 4.5</div></div>
        <div><div class="goles-pct" style="color:${pColor(d.o45)}">${d.o45}%</div></div>
      </div>
      <div class="goles-card ${pCls(d.o55)}" style="border-color:${pColor(d.o55)}66">
        <div><div class="goles-lbl">Over 5.5</div></div>
        <div><div class="goles-pct" style="color:${pColor(d.o55)}">${d.o55||'—'}%</div></div>
      </div>
      ${d.o65&&d.o65>=80?'<div class="goles-card '+pCls(d.o65)+'" style="border-color:'+pColor(d.o65)+'66"><div><div class="goles-lbl">Over 6.5</div></div><div><div class="goles-pct" style="color:'+pColor(d.o65)+'">'+d.o65+'%</div></div></div>':''}
    </div>`;
}

/* ===== DETALLE ===== */
function tabDetalle(d){
  const leaderBtns=`
    <div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-bottom:7px;letter-spacing:.06em">¿QUIÉN VA GANANDO AL HT?</div>
    <div class="leader-toggle">
      <div class="leader-btn${leaderD===d.p1?' active':''}" onclick="setLeader('D','${d.p1}')">
        <span class="lb-name">${d.p1}</span><span class="lb-sub">WR ${d.wr_p1}%</span>
      </div>
      <div class="leader-btn${leaderD===d.p2?' active':''}" onclick="setLeader('D','${d.p2}')">
        <span class="lb-name">${d.p2}</span><span class="lb-sub">WR ${d.wr_p2}%</span>
      </div>
    </div>`;

  if(!leaderD){
    return `${leaderBtns}
      <div class="card">
        <div class="card-title">DATOS DIRECTOS DEL PAR</div>
        <div class="rs-row"><span style="color:#9aa0b0">Partidos totales</span><b style="font-family:monospace">${d.total}</b></div>
        <div class="rs-row"><span style="color:#9aa0b0">Media goles</span><b style="font-family:monospace">${d.mg}</b></div>
        <div class="rs-row"><span style="color:#9aa0b0">Over 4.5</span><b style="font-family:monospace">${d.o45}%</b></div>
        <div class="rs-row"><span style="color:#9aa0b0">Over 5.5</span><b style="font-family:monospace">${d.o55}%</b></div>
        <div class="rs-row"><span style="color:#9aa0b0">Frec. HT diff ≥2</span><b style="font-family:monospace">${d.freq_ht2}%</b></div>
      </div>
      <div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-bottom:8px">Selecciona quién lidera para ver el desglose</div>`;
  }

  const rival=leaderD===d.p1?d.p2:d.p1;
  const la=ADV[leaderD],ra=ADV[rival];
  const u2=getU(d,leaderD,2);

  function isRow(diff){
    const v=la&&la[`is${diff}`];
    if(!v) return `<div class="rs-row"><span style="color:#9aa0b0">Diff ${diff} (solidez)</span><span style="color:#5a6070">sin datos</span></div>`;
    const c=v.dnb>=90?'#00e87a':v.dnb>=80?'#f5c542':'#ff4a6b';
    return `<div class="rs-row"><span style="color:#9aa0b0">Diff ${diff} · ${v.n}p</span><span>DNB <b style="color:${c}">${v.dnb}%</b> · Pierde <b style="color:#ff4a6b">${v.lose}%</b></span></div>`;
  }
  function irRow(diff){
    const v=ra&&ra[`ir${diff}`];
    if(!v) return `<div class="rs-row"><span style="color:#9aa0b0">Diff ${diff} (remontada)</span><span style="color:#5a6070">sin datos</span></div>`;
    const c=v.remonta<=5?'#00e87a':v.remonta<=10?'#f5c542':'#ff4a6b';
    return `<div class="rs-row"><span style="color:#9aa0b0">Diff ${diff} · ${v.n}p</span><span>Remonta <b style="color:${c}">${v.remonta}%</b> · Empata <b style="color:#3d9eff">${v.empata}%</b></span></div>`;
  }

  return `${leaderBtns}
    <div class="up-card ${u2?pCls(u2):'xc'}">
      <div class="up-label">P(DNB) UNIFICADO — ${leaderD.toUpperCase()} +2</div>
      <div class="up-main">${u2||'—'}${u2?'%':''}</div>
      <div class="up-source">Directo: ${getU(d,leaderD,2)?d[leaderD===d.p1?'nd2_p1':'nd2_p2']:0}p · Complementado con similares</div>
    </div>
    <div class="card">
      <div class="card-title">🛡 SOLIDEZ DE ${leaderD.toUpperCase()} (datos combinados)</div>
      ${isRow(1)}${isRow(2)}${isRow(3)}
    </div>
    <div class="card">
      <div class="card-title">⚡ REMONTADA DE ${rival.toUpperCase()} (datos combinados)</div>
      ${irRow(1)}${irRow(2)}${irRow(3)}
    </div>`;
}

/* ===== PERFILES ===== */
function tabPerfiles(d){
  const a1=ADV[d.p1],a2=ADV[d.p2];
  if(!a1||!a2) return '<div class="no-pair">Sin datos de perfil</div>';
  const gTag=g=>g==='alto'?'<span class="tag tag-h">ALTO</span>':g==='medio'?'<span class="tag tag-m">MEDIO</span>':'<span class="tag tag-l">BAJO</span>';
  function rows(pAdv,type){
    let r='';
    for(const diff of [1,2,3]){
      const v=pAdv[`${type}${diff}`];
      if(!v){r+=`<div class="diff-row"><span style="color:#5a6070">Diff ${diff}</span><span style="color:#5a6070">—</span></div>`;continue;}
      if(type==='is'){const c=v.dnb>=90?'#00e87a':v.dnb>=80?'#f5c542':'#ff4a6b';r+=`<div class="diff-row"><span style="color:#9aa0b0">+${diff}g</span><span>DNB:<b style="color:${c}">${v.dnb}%</b> P:<b style="color:#ff4a6b">${v.lose}%</b></span></div>`;}
      else{const c=v.remonta<=5?'#00e87a':v.remonta<=10?'#f5c542':'#ff4a6b';r+=`<div class="diff-row"><span style="color:#9aa0b0">-${diff}g</span><span>R:<b style="color:${c}">${v.remonta}%</b> E:<b style="color:#3d9eff">${v.empata}%</b></span></div>`;}
    }
    return r;
  }
  return `<div class="profile-grid">
    <div class="profile-card">
      <div style="font-weight:700;font-size:13px;margin-bottom:6px">${d.p1}</div>
      <div style="font-family:monospace;font-size:10px;margin-bottom:8px">WR: <b>${a1.wr}%</b> ${gTag(a1.wr_group)}</div>
      <div style="font-family:monospace;font-size:9px;color:#00e87a;margin-bottom:5px">🛡 SOLIDEZ (DNB=no pierde P=pierde)</div>${rows(a1,'is')}
      <div style="font-family:monospace;font-size:9px;color:#ff4a6b;margin:8px 0 5px">⚡ REMONTADA (R=remonta E=empata)</div>${rows(a1,'ir')}
    </div>
    <div class="profile-card">
      <div style="font-weight:700;font-size:13px;margin-bottom:6px">${d.p2}</div>
      <div style="font-family:monospace;font-size:10px;margin-bottom:8px">WR: <b>${a2.wr}%</b> ${gTag(a2.wr_group)}</div>
      <div style="font-family:monospace;font-size:9px;color:#00e87a;margin-bottom:5px">🛡 SOLIDEZ</div>${rows(a2,'is')}
      <div style="font-family:monospace;font-size:9px;color:#ff4a6b;margin:8px 0 5px">⚡ REMONTADA</div>${rows(a2,'ir')}
    </div>
  </div>`;
}

/* ===== CORE ===== */
function showTab(t){
  tab=t;
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',['hoy','resumen','detalle','perfiles'][i]===t));
  renderMain();
}
function setLeader(tid,player){
  if(tid==='R') leaderR=leaderR===player?'':player;
  else leaderD=leaderD===player?'':player;
  renderMain();
}
function renderPicker(){
  const picker=document.getElementById('picker');
  if(p1&&p2){picker.style.display='none';return;}
  picker.style.display='block';
  document.getElementById('picker-label').innerHTML=!p1?'Selecciona <span>Jugador 1</span>':'Selecciona <span>Jugador 2</span>';
  document.getElementById('player-grid').innerHTML=PLAYERS.map(p=>{
    let cls='player-pill';
    if(p===p1) cls+=' p1';
    else if(p===p2) cls+=' p2';
    return `<div class="${cls}" onclick="selectPlayer('${p}')">${p}</div>`;
  }).join('');
}
function updateChips(){
  const c1=document.getElementById('chip1'),c2=document.getElementById('chip2');
  c1.className='sel-chip '+(p1?'filled1':'empty');
  c2.className='sel-chip '+(p2?'filled2':'empty');
  document.getElementById('chip1name').textContent=p1||'Jugador 1';
  document.getElementById('chip1sub').textContent=p1?'✓ seleccionado':'pulsa abajo';
  document.getElementById('chip2name').textContent=p2||'Jugador 2';
  document.getElementById('chip2sub').textContent=p2?'✓ seleccionado':'pulsa abajo';
}
function selectPlayer(p){
  if(rechip===1){p1=p;rechip=0;}
  else if(rechip===2){p2=p;rechip=0;}
  else if(!p1){p1=p;}
  else if(!p2&&p!==p1){p2=p;}
  else if(p===p1){p1='';leaderR='';leaderD='';}
  else if(p===p2){p2='';leaderR='';leaderD='';}
  updateChips();renderPicker();renderTabs();
}
function rechipClick(n){
  if((n===1&&p1)||(n===2&&p2)){
    rechip=n;
    if(n===1){p1='';leaderR='';leaderD='';}
    else{p2='';leaderR='';leaderD='';}
    updateChips();renderPicker();renderTabs();
  }
}
function renderTabs(){
  document.getElementById('tabs-wrap').style.display='block';
  renderMain();
}
function resetAll(){
  p1='';p2='';leaderR='';leaderD='';rechip=0;tab='hoy';
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',i===0));
  updateChips();renderPicker();renderMain();
}
function renderMain(){
  const main=document.getElementById('main');
  if(tab==='hoy'){main.innerHTML=`<div class="result">${tabHoy()}</div>`;return;}
  const d=PAIRS[pairKey(p1,p2)];
  if(!d){main.innerHTML=`<div class="result"><div class="no-pair">Sin datos para este par</div></div>`;return;}
  let content='';
  if(tab==='resumen') content=tabResumen(d);
  else if(tab==='detalle') content=tabDetalle(d);
  else content=tabPerfiles(d);
  main.innerHTML=`<div class="result">${content}</div>`;
}
fetch('./data.json')
  .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
  .then(function(d){
    Object.assign(PAIRS, d.P);
    Object.assign(ADV, d.A);
    d.S.forEach(function(s){ SCHEDULE.push(s); });
    document.getElementById('tabs-wrap').style.display='block';
    renderPicker();updateChips();renderMain();
  })
  .catch(function(e){
    document.body.insertAdjacentHTML('afterbegin',
      '<div style="position:fixed;top:0;left:0;right:0;background:#c0392b;color:white;padding:14px;font-size:12px;z-index:9999;text-align:center">&#9888; Error: '+e.message+'</div>'
    );
  });
</script>
</body>
</html>
